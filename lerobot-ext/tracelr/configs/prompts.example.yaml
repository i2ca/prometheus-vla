# Example prompts configuration for tracelr.
#
# Place this file as:
#   <dataset_dir>/prompts.yaml     -- dataset-specific prompts
#   ~/.config/tracelr/prompts.yaml  -- user default
#
# Keys 1-9 map to prompts by position.

prompts:
  - label: "Red cube"
    prompt: "Pick up the red cube and place it in the bowl"
    color: [220, 60, 60]

  - label: "Orange cube"
    prompt: "Pick up the orange cube and place it in the bowl"
    color: [240, 160, 40]

  - label: "Blue cube"
    prompt: "Pick up the blue cube and place it in the bowl"
    color: [60, 100, 220]

  - label: "Green cube"
    prompt: "Pick up the green cube and place it in the bowl"
    color: [60, 180, 75]
