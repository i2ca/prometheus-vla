# ==========================================================
# 1. DATASET DE TREINAMENTO (O que a IA vai estudar)
# ==========================================================
dataset:
  repo_id: Mrwlker/teste3
  root: meu_dataset/teste3
  episodes: [0]

# ==========================================================
# 2. DATASET DE VALIDAÇÃO (A "Prova Surpresa")
# ==========================================================
val_dataset:
  repo_id: Mrwlker/teste3
  root: meu_dataset/teste3
  episodes: [0]

# ==========================================================
# 3. ARQUITETURA DA IA (Action Chunking with Transformers - ACT)
# ==========================================================
policy:
  type: act
  repo_id: Mrwlker/teste3_policy  # <--- Faltou isso
  push_to_hub: false              # <--- E isso!
  
  # ENTRADAS DA IA (O que o robô VÊ e SENTE)
  input_features:
    # 1. Visão RGB (Cores)
    observation.images.head_camera:
      type: VISUAL
      shape: [3, 480, 640]
    # 2. Visão de Profundidade (O Mapa de Calor)
    observation.images.head_camera_depth:
      type: VISUAL
      shape: [3, 480, 640]
    # 3. Propriocepção e Tato (Nosso supervetor perfeito)
    observation.state:
      type: STATE
      shape: [109] # 43 motores + 66 pressões da Dex3
      
  # SAÍDAS DA IA (O que o robô FAZ)
  output_features:
    action:
      type: ACTION
      shape: [43] # Comando de posição para os 43 motores

  # Configurações do Transformer (Memória de curto prazo)
  chunk_size: 100
  n_action_steps: 100
  n_obs_steps: 1
  
  use_amp: true # Mixed Precision (Crucial para acelerar o treino em placas RTX)

# ==========================================================
# 4. CONFIGURAÇÕES DE TREINAMENTO (Hiperparâmetros)
# ==========================================================
output_dir: "train_output/teste3_tactile_depth"
steps: 80000          
batch_size: 4         # Mantido em 4 para testes.
log_freq: 200         
save_freq: 10000      
save_checkpoint: true

# ==========================================================
# 5. AVALIAÇÃO E LOGS
# ==========================================================
eval_freq: 2000       

wandb:
  enable: false       
  project: prometheus_g1