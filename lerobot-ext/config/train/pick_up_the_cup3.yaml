# ==========================================================
# 1. DATASET DE TREINAMENTO (O que a IA vai estudar)
# ==========================================================
dataset:
  image_transforms:
    enable: true
    max_num_transforms: 3
    tfs:
      ColorJitter:
        type: ColorJitter  # <--- ADICIONE ESTA LINHA AQUI!
        weight: 1.0
        kwargs:
          brightness: [0.8, 1.2]
          contrast: [0.8, 1.2]
          saturation: [0.5, 1.5]
          hue: [-0.05, 0.05]
  repo_id: Mrwlker/pick_up_the_cup3
  root: meu_dataset/pick_up_the_cup3
  episodes: [1, 2, 4, 5, 6, 7, 9, 10, 11, 12, 13, 14, 16, 17, 18, 20, 21, 22, 23]

# ==========================================================
# 2. DATASET DE VALIDAÇÃO (A "Prova Surpresa")
# ==========================================================
val_dataset:
  repo_id: Mrwlker/pick_up_the_cup3
  root: meu_dataset/pick_up_the_cup3
  episodes: [3, 8, 15, 19]

# ==========================================================
# 3. ARQUITETURA DA IA (Action Chunking with Transformers - ACT)
# ==========================================================
policy:
  type: act
  repo_id: Mrwlker/pick_up_the_cup3  # <--- Faltou isso
  push_to_hub: false              # <--- E isso!
  
  # ENTRADAS DA IA (O que o robô VÊ e SENTE)
  input_features:
    # 1. Visão RGB (Cores)
    observation.images.head_camera:
      type: VISUAL
      shape: [3, 480, 640]
    # 2. Visão de Profundidade (O Mapa de Calor)
    observation.images.head_camera_depth:
      type: VISUAL
      shape: [3, 480, 640]
    # 3. Propriocepção e Tato (Nosso supervetor perfeito)
    observation.state:
      type: STATE
      shape: [28] # 43 motores + 66 pressões da Dex3
      
  # SAÍDAS DA IA (O que o robô FAZ)
  output_features:
    action:
      type: ACTION
      shape: [28] # Comando de posição para os 43 motores

  # Configurações do Transformer (Memória de curto prazo)
  chunk_size: 100
  n_action_steps: 100
  n_obs_steps: 1
  
  use_amp: true # Mixed Precision (Crucial para acelerar o treino em placas RTX)

# ==========================================================
# 4. CONFIGURAÇÕES DE TREINAMENTO (Hiperparâmetros)
# ==========================================================
output_dir: "train_output/pick_up_the_cup3"
steps: 100          
batch_size: 2        # Mantido em 4 para testes.
num_workers: 2
log_freq: 10         
save_freq: 100      
save_checkpoint: true

# ==========================================================
# 5. AVALIAÇÃO E LOGS
# ==========================================================
eval_freq: 50       

wandb:
  enable: true       
  project: prometheus_g1
