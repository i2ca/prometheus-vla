# ==========================================================
# CONFIGURAÇÃO DE TREINAMENTO ACT-D (Depth-Augmented)
# Tarefa: Empurrar a Xícara (Push Cup)
# ==========================================================

# --- DATASET DE TREINAMENTO ---
dataset:
  repo_id: Mrwlker/push_cup
  root: meu_dataset/push_cup
  episodes: [0, 1, 2, 3, 4, 5, 6, 7] # 80% do dataset para treino

# --- DATASET DE VALIDAÇÃO (PROVA SURPRESA) ---
val_dataset:
  repo_id: Mrwlker/push_cup
  root: meu_dataset/push_cup
  episodes: [8, 9] # 20% do dataset para teste/validação

# --- POLÍTICA NEURAL (ACT-D) ---
policy:
  type: act
  repo_id: Mrwlker/act_d_push_cup
  push_to_hub: false
  use_amp: true # Ativa mixed-precision para acelerar a GPU
  
  # A MÁGICA: Configuração das Entradas Multimodais
  input_features:
    observation.images.head_camera:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.head_camera_depth:
      type: VISUAL
      shape: [3, 480, 640]
      
    observation.state:
      type: STATE
      shape: [28] # APENAS BRAÇOS E MÃOS (Cortou pernas!)
      
    observation.left_hand_pressure:
      type: STATE
      shape: [33]
      
    observation.right_hand_pressure:
      type: STATE
      shape: [33]

# --- PARÂMETROS DE TREINO ---
output_dir: "train_output/act_d_push_cup"
steps: 10000
batch_size: 16
log_freq: 200
save_freq: 10000
save_checkpoint: true

# --- AVALIAÇÃO ---
eval_freq: 500 # A cada 500 passos ele testa a "Prova Surpresa"

# --- LOG ---
wandb:
  enable: false
  project: prometheus_g1